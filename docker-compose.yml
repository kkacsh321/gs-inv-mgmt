services:
  db:
    image: postgres:16
    container_name: gs_inventory_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-goldenstackers}
      POSTGRES_USER: ${POSTGRES_USER:-goldenstackers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goldenstackers}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goldenstackers} -d ${POSTGRES_DB:-goldenstackers}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gs_inventory_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DB_AUTO_MIGRATE: "false"
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - .:/app

  sync_worker:
    build: .
    container_name: gs_inventory_sync_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: ["python", "-m", "app.services.sync_runner"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - .:/app

  slack_ops_worker:
    build: .
    container_name: gs_inventory_slack_ops_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: ["python", "-m", "app.services.slack_ops_runner"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - .:/app

  migrate:
    build: .
    container_name: gs_inventory_migrate
    restart: "no"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: ["python", "-m", "app.db.migrate", "upgrade"]
    depends_on:
      db:
        condition: service_healthy

  seed:
    build: .
    container_name: gs_inventory_seed
    restart: "no"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: ["python", "-m", "app.db.seed"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: gs_inventory_minio
    restart: unless-stopped
    profiles: ["local-s3"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
