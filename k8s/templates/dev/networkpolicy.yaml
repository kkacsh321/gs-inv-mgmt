apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gs-inv-default
  labels:
    app.kubernetes.io/name: gs-inv-mgmt
    env: dev
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gs-inv-mgmt
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchExpressions:
              - key: k8s-app
                operator: In
                values: ["kube-dns", "coredns"]
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
        - protocol: UDP
          port: 123
