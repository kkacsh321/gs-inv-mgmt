apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gs-inv-app
  labels:
    app.kubernetes.io/name: gs-inv-mgmt
    env: dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gs-inv-app
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
