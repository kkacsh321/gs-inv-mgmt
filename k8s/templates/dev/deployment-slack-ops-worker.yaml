apiVersion: apps/v1
kind: Deployment
metadata:
  name: gs-inv-slack-ops-worker
  labels:
    app.kubernetes.io/name: gs-inv-mgmt
    app.kubernetes.io/component: slack-ops-worker
    env: dev
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: gs-inv-slack-ops-worker
  template:
    metadata:
      labels:
        app: gs-inv-slack-ops-worker
        app.kubernetes.io/name: gs-inv-mgmt
        app.kubernetes.io/component: slack-ops-worker
        env: dev
    spec:
      containers:
        - name: slack-ops-worker
          image: ghcr.io/goldenstackers/gs-inv-mgmt:dev
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.services.slack_ops_runner"]
          envFrom:
            - configMapRef:
                name: gs-inv-config
            - secretRef:
                name: gs-inv-secret
          env:
            - name: LOCAL_MEDIA_ROOT
              value: /var/gs-inv/media
            - name: BACKUP_LOCAL_DIR
              value: /var/gs-inv/backups
          volumeMounts:
            - name: media-data
              mountPath: /var/gs-inv/media
            - name: backups-data
              mountPath: /var/gs-inv/backups
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
      securityContext:
        fsGroup: 10001
      volumes:
        - name: media-data
          persistentVolumeClaim:
            claimName: gs-inv-media-pvc
        - name: backups-data
          persistentVolumeClaim:
            claimName: gs-inv-backups-pvc
