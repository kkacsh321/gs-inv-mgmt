apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gs-inv-root
  namespace: argocd
  labels:
    app.kubernetes.io/name: gs-inv-mgmt
spec:
  project: default
  source:
    repoURL: https://github.com/REPLACE_ME/REPLACE_INFRA_REPO.git
    targetRevision: main
    path: apps/gs-inv/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PrunePropagationPolicy=foreground
      - PruneLast=true
